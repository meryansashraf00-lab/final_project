<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products | AstroShop</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  
  <header>
    <div class="navbar">
      <a href="index.html" class="logo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="9" cy="21" r="1"></circle>
          <circle cx="20" cy="21" r="1"></circle>
          <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
        </svg>
        AstroShop
      </a>
      
      <button class="menu-toggle">☰</button>
      
      <nav class="nav-links">
        <a href="index.html">Home</a>
        <a href="products.html" style="color: var(--primary-color);">Products</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
        
        <div class="theme-switch-wrapper">
          <label class="theme-switch" for="checkbox">
            <input type="checkbox" id="checkbox" />
            <div class="slider round"></div>
          </label>
        </div>

        <a href="cart.html" class="cart-icon">
          🛒
          <span class="cart-count" id="cart-count">0</span>
        </a>
      </nav>
    </div>
  </header>

  <main class="container">
    <div class="controls-bar">
      <input type="text" id="search-input" class="search-input" placeholder="Search products...">
      
      <select id="category-filter" class="category-filter">
        <option value="All">All Categories</option>
        <option value="Electronics">Electronics</option>
        <option value="Accessories">Accessories</option>
        <option value="Clothing">Clothing</option>
        <option value="Furniture">Furniture</option>
        <option value="Groceries">Groceries</option>
      </select>
    </div>

    <section class="products-section" style="padding-top: 0">
      <div id="shop-products" class="product-grid">
        <!-- Products injected dynamically -->
      </div>
    </section>
  </main>

  <footer>
    <div class="footer-content">
      <div class="footer-section">
        <h3 class="logo">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="9" cy="21" r="1"></circle>
            <circle cx="20" cy="21" r="1"></circle>
            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
          </svg>
          AstroShop
        </h3>
        <p>Your one-stop destination for premium lifestyle products.</p>
      </div>
      <div class="footer-section">
        <h3>Quick Links</h3>
        <ul style="display:flex; flex-direction:column; gap:0.5rem;">
          <li><a href="index.html">Home</a></li>
          <li><a href="products.html">Shop</a></li>
          <li><a href="about.html">About Us</a></li>
          <li><a href="contact.html">Contact</a></li>
        </ul>
      </div>
      <div class="footer-section">
        <h3>Newsletter</h3>
        <p>Subscribe to get special offers and updates.</p>
        <div class="flex mt-1">
          <input type="email" class="form-control" placeholder="Your Email" style="border-radius: 6px 0 0 6px;">
          <button class="btn btn-primary" style="border-radius: 0 6px 6px 0;">Subscribe</button>
        </div>
      </div>
    </div>
    <div class="footer-bottom">
      <p>&copy; 2026 AstroShop. All rights reserved.</p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
